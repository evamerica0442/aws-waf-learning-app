services:
  # Web Service (serves both API and static frontend)
  - type: web
    name: aws-waf-app
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm install --prefix client && npm run build && npm run db:migrate
    startCommand: npm start
    healthCheckPath: /api/pillars
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: aws-waf-db
          property: connectionString

databases:
  - name: aws-waf-db
    plan: free
    databaseName: aws_waf_learning
    ipAllowList: []